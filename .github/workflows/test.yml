name: Test Omega Trading Intelligence

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify imports
        run: |
          python -c "from tradingbot.core.enums import Side, OrderType, Timeframe; print('Core enums OK')"
          python -c "from tradingbot.core.types import OHLCVBar, Signal, StrategyGenome; print('Core types OK')"
          python -c "from tradingbot.core.events import EventBus, Event; print('EventBus OK')"
          python -c "from tradingbot.genome.rule_tree import random_tree, TreeNode; print('Rule tree OK')"
          python -c "from tradingbot.genome.strategy_genome import create_random_genome, crossover_genomes, mutate_genome; print('Genome ops OK')"
          python -c "from tradingbot.genome.genome_encoder import GenomeEvaluator; print('Genome encoder OK')"
          python -c "from tradingbot.evolution.gp_engine import GPEngine; print('GP engine OK')"
          python -c "from tradingbot.evolution.llm_architect import LLMStrategist; print('LLM architect OK')"
          python -c "from tradingbot.swarm.ant_colony import AntColonyOptimizer; print('Ant colony OK')"
          python -c "from tradingbot.swarm.particle_swarm import ParticleSwarmOptimizer; print('PSO OK')"
          python -c "from tradingbot.regime.hmm_detector import HMMRegimeDetector; print('HMM detector OK')"
          python -c "from tradingbot.world_model.causal_graph import CausalGraphEngine; print('Causal graph OK')"
          python -c "from tradingbot.world_model.market_simulator import MarketSimulator; print('Market simulator OK')"
          python -c "from tradingbot.consciousness.metacognition import MetacognitionEngine; print('Metacognition OK')"
          python -c "from tradingbot.population.fitness import FitnessEvaluator; print('Fitness evaluator OK')"
          python -c "from tradingbot.risk.risk_manager import RiskManager; print('Risk manager OK')"
          python -c "from tradingbot.execution.order_manager import OrderManager; print('Order manager OK')"
          python -c "from tradingbot.exchanges.ccxt_adapter import CCXTAdapter; print('CCXT adapter OK')"
          python -c "from tradingbot.exchanges.paper_exchange import PaperExecutionBackend; print('Paper exchange OK')"
          python -c "from tradingbot.backtesting.engine import BacktestEngine; print('Backtest engine OK')"
          python -c "from tradingbot.monitoring.telegram import TelegramNotifier; print('Telegram notifier OK')"
          python -c "from tradingbot.config import OmegaConfig, load_config; print('Config OK')"
          print('=== ALL IMPORTS PASSED ===')

      - name: Test genome creation and evolution
        run: |
          python -c "
from tradingbot.genome.strategy_genome import create_random_genome, crossover_genomes, mutate_genome
from tradingbot.genome.rule_tree import random_tree, tree_depth, tree_size

# Create random genomes
g1 = create_random_genome()
g2 = create_random_genome()
print(f'Genome 1: {len(g1.signal_tree)} nodes, risk_params={list(g1.risk_params.keys())}')
print(f'Genome 2: {len(g2.signal_tree)} nodes, risk_params={list(g2.risk_params.keys())}')

# Crossover
child = crossover_genomes(g1, g2)
print(f'Child: {len(child.signal_tree)} nodes, generation={child.generation}')

# Mutation
mutated = mutate_genome(g1, mutation_rate=0.5)
print(f'Mutated: {len(mutated.signal_tree)} nodes')

# Tree stats
d = tree_depth(g1.signal_tree)
s = tree_size(g1.signal_tree)
print(f'Tree depth={d}, size={s}')

print('=== GENOME TESTS PASSED ===')
"

      - name: Test fitness evaluation
        run: |
          python -c "
import numpy as np
from tradingbot.population.fitness import FitnessEvaluator

evaluator = FitnessEvaluator({'fitness': {'sharpe_weight': 0.35, 'sortino_weight': 0.25, 'max_dd_weight': 0.20, 'win_rate_weight': 0.10, 'stability_weight': 0.10}})

# Simulate equity curve
equity = [100000.0]
for i in range(500):
    change = np.random.normal(0.0003, 0.015)
    equity.append(equity[-1] * (1 + change))

# Simulate trade returns
trades = np.random.normal(0.001, 0.02, 100).tolist()

result = evaluator.evaluate(equity, trades)
print(f'Composite fitness: {result.composite_fitness:.4f}')
print(f'Sharpe: {result.sharpe_ratio:.4f}')
print(f'Sortino: {result.sortino_ratio:.4f}')
print(f'Max DD: {result.max_drawdown:.4f}')
print(f'Win rate: {result.win_rate:.4f}')
print(f'Stability: {result.stability:.4f}')

print('=== FITNESS TESTS PASSED ===')
"

      - name: Test regime detection
        run: |
          python -c "
import numpy as np
from tradingbot.regime.hmm_detector import HMMRegimeDetector

detector = HMMRegimeDetector({'regime': {'n_regimes': 4}})

# Generate synthetic returns
np.random.seed(42)
returns = np.concatenate([
    np.random.normal(0.001, 0.01, 200),  # bull low-vol
    np.random.normal(-0.002, 0.03, 150), # bear high-vol
    np.random.normal(0.0005, 0.015, 150) # sideways
])

# Test simple detect (no HMM training needed)
regime = detector.simple_detect(returns[-50:])
print(f'Detected regime: {regime}')
print(f'Regime type: {type(regime).__name__}')

print('=== REGIME TESTS PASSED ===')
"

      - name: Test world model
        run: |
          python -c "
import numpy as np
from tradingbot.world_model.market_simulator import MarketSimulator

simulator = MarketSimulator({'world_model': {'n_scenarios': 100, 'horizon': 50}})

# Generate scenarios
np.random.seed(42)
current_price = 50000.0
returns = np.random.normal(0.0002, 0.02, 500)

scenarios = simulator.simulate_scenarios(current_price, returns, n_scenarios=100, horizon=50)
print(f'Generated {len(scenarios)} scenarios')
print(f'Each scenario has {len(scenarios[0])} steps')
print(f'Price range: {min(s[-1] for s in scenarios):.0f} - {max(s[-1] for s in scenarios):.0f}')

# VaR calculation
var_result = simulator.monte_carlo_var(returns, confidence=0.95)
print(f'VaR(95%): {var_result[\"var\"]:.4f}')
print(f'CVaR(95%): {var_result[\"cvar\"]:.4f}')

print('=== WORLD MODEL TESTS PASSED ===')
"

      - name: Test swarm intelligence
        run: |
          python -c "
import numpy as np
from tradingbot.swarm.particle_swarm import ParticleSwarmOptimizer

# Minimize a simple function: sphere function
def sphere(x):
    return -sum(xi**2 for xi in x)  # Negative because we maximize

pso = ParticleSwarmOptimizer({'swarm': {'n_particles': 20, 'n_dimensions': 3, 'bounds': [(-5, 5)] * 3}})
result = pso.optimize(sphere, n_iterations=50)
print(f'Best position: {result[\"best_position\"]}')
print(f'Best fitness: {result[\"best_fitness\"]:.4f}')

print('=== SWARM TESTS PASSED ===')
"

      - name: Test consciousness layer
        run: |
          python -c "
