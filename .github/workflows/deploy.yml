name: Deploy Omega Trading Bot

on:
  push:
    branches: [master, main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------
  # Stage 1: Build and push Docker image
  # ---------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------
  # Stage 2: Deploy to staging
  # ---------------------------------------------------------------
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.omega-bot.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "Deploying image tag: ${IMAGE_TAG} to staging ..."

          # Placeholder: Replace with your actual deployment mechanism.
          # Examples:
          #   - SSH + docker pull + docker-compose up
          #   - kubectl set image
          #   - AWS ECS update-service
          #   - Terraform apply

          # ssh -i "${DEPLOY_KEY}" deploy@${DEPLOY_HOST} \
          #   "cd /opt/omega && docker-compose pull && docker-compose up -d"

          echo "Staging deployment triggered (placeholder)"

      - name: Wait for staging to stabilize
        run: sleep 30

  # ---------------------------------------------------------------
  # Stage 3: Smoke tests against staging
  # ---------------------------------------------------------------
  smoke-tests:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install httpx pytest

      - name: Run smoke tests
        env:
          STAGING_URL: https://staging.omega-bot.example.com
        run: |
          export PYTHONPATH="${{ github.workspace }}/src:$PYTHONPATH"
          python -c "
          import httpx, sys

          url = '${STAGING_URL}'

          # Health endpoint check
          try:
              r = httpx.get(f'{url}/health', timeout=15)
              assert r.status_code == 200, f'Health check failed: {r.status_code}'
              data = r.json()
              assert data.get('status') in ('ok', 'shutting_down'), f'Unexpected status: {data}'
              print(f'Health check passed: {data}')
          except httpx.ConnectError:
              print('WARNING: Could not connect to staging -- skipping remote smoke tests')
              sys.exit(0)

          # Metrics endpoint check
          try:
              r = httpx.get(f'{url}/metrics', timeout=15)
              assert r.status_code == 200
              print('Metrics endpoint OK')
          except Exception as e:
              print(f'Metrics check warning: {e}')

          print('=== SMOKE TESTS PASSED ===')
          "

  # ---------------------------------------------------------------
  # Stage 4: Deploy to production (manual approval gate)
  # ---------------------------------------------------------------
  deploy-production:
    needs: smoke-tests
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://omega-bot.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
          DEPLOY_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
        run: |
          echo "Deploying image tag: ${IMAGE_TAG} to production ..."

          # Placeholder: Replace with your actual deployment mechanism.
          # Examples:
          #   - SSH + docker pull + docker-compose up
          #   - kubectl set image
          #   - AWS ECS update-service

          # ssh -i "${DEPLOY_KEY}" deploy@${DEPLOY_HOST} \
          #   "cd /opt/omega && docker-compose pull && docker-compose up -d"

          echo "Production deployment triggered (placeholder)"

      - name: Post-deploy verification
        env:
          PRODUCTION_URL: https://omega-bot.example.com
        run: |
          echo "Waiting for production to stabilize ..."
          sleep 30

          # Placeholder: verify production health
          # curl -sf "${PRODUCTION_URL}/health" || exit 1

          echo "Production deploy complete"
