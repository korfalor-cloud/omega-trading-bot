name: Test Omega Trading Intelligence

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # treat all other flake8 warnings as non-blocking
          flake8 src/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Type check with mypy (non-blocking)
        continue-on-error: true
        run: |
          mypy src/tradingbot/ --ignore-missing-imports --no-error-summary || true

      - name: Run pytest
        run: |
          export PYTHONPATH="${{ github.workspace }}/src:$PYTHONPATH"
          pytest tests/ -v --tb=short --cov=tradingbot --cov-report=term-missing || pytest tests/ -v --tb=short

      - name: Core import smoke test
        run: |
          export PYTHONPATH="${{ github.workspace }}/src:$PYTHONPATH"
          python -c "
          from tradingbot.core.enums import Side, OrderType, Timeframe
          from tradingbot.core.types import OHLCVBar, Signal, Order, Fill, Position
          from tradingbot.core.events import EventBus, Event
          from tradingbot.core.interfaces import ExchangeAdapter, Strategy, RiskEngine
          from tradingbot.core.errors import OmegaError, ExchangeError, OrderError
          from tradingbot.config import OmegaConfig
          print('Core imports OK')
          "

      - name: Engine module smoke test
        run: |
          export PYTHONPATH="${{ github.workspace }}/src:$PYTHONPATH"
          python -c "
          from tradingbot.engine import AsyncTradingEngine, DataFeedManager, OrderPipeline
          from tradingbot.engine.data_feed import DataQualityChecker, BarAggregator, DataQualityReport
          from tradingbot.engine.order_pipeline import PipelineMetrics
          from tradingbot.engine.async_engine import EngineMetrics
          print('Engine imports OK')

          # Verify EngineMetrics dataclass
          m = EngineMetrics()
          m.bars_processed = 10
          assert m.bars_processed == 10
          snap = m.snapshot()
          assert 'bars_processed' in snap
          assert 'uptime_seconds' in snap
          print('EngineMetrics OK')

          # Verify DataQualityChecker
          dqc = DataQualityChecker()
          assert dqc is not None
          print('DataQualityChecker OK')

          # Verify PipelineMetrics
          pm = PipelineMetrics()
          assert pm.orders_submitted == 0
          print('PipelineMetrics OK')
          print('=== ENGINE MODULE SMOKE TESTS PASSED ===')
          "
